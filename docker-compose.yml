services:
  postgres:
    image: postgres:16

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: evolution

    ports:
      - "5433:5432"

    volumes:
      - evolution_postgres:/var/lib/postgresql/data

  redis:
    image: redis:7

  evolution:
    image: atendai/evolution-api:v2.0.10

    depends_on:
      - postgres
      - redis

    ports:
      - "8080:8080"

    environment:
      AUTHENTICATION_API_KEY: vida_leve_secret_key

      DATABASE_PROVIDER: postgresql

      DATABASE_CONNECTION_URI: postgres://postgres:postgres@postgres:5432/evolution

      CACHE_REDIS_ENABLED: "true"

      CACHE_REDIS_URI: redis://redis:6379

volumes:
  evolution_postgres: